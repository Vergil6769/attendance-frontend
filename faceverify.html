<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Face Verification</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<h2>Student Face Verification</h2>

<!-- Login Section -->
<div id="login-section">
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <button id="login-btn">Login</button>
</div>

<!-- Face Verification Section -->
<div id="face-section" style="display:none;">
    <h3>Face Verification</h3>
    <video id="camera" width="320" height="240" autoplay></video>
    <button id="capture-btn">Capture Angle</button>
    <p id="angle-info">Angle: Front</p>
    <p id="timer">Timer: 10s</p>
</div>

<!-- Redirect to QR Scan -->
<div id="qr-section" style="display:none;">
    <h3>Scan QR Code</h3>
    <video id="qr-camera" width="320" height="240" autoplay></video>
</div>

<script src="js/face_capture.js"></script>
</body>
</html>
