<!DOCTYPE html>
<html>

<head>
  <title>Student Attendance</title>
  <link rel="stylesheet" href="css/style.css">

  <!-- Face API -->
  <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/jsqr"></script>
  <script defer src="js/face_capture.js"></script>
</head>

<body>
  <h2>Student Attendance</h2>

  <!-- LOGIN -->
  <div id="login-section">
    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">
    <button id="login-btn">Login</button>
  </div>

  <!-- FACE VERIFY -->
  <div id="face-section" style="display:none; position: relative;">
    <h3>Face Verification</h3>
    <video id="camera" width="400" autoplay muted></video>
    <canvas id="face-canvas" style="position:absolute; top:0; left:0;"></canvas>
    <br>
    <button id="capture-btn">Verify Face</button>
    <p id="timer"></p>
  </div>

  <!-- QR SCAN -->
  <div id="qr-section" style="display:none;">
    <h3>Scan QR Code</h3>
    <video id="qr-camera" width="400" autoplay muted></video>
  </div>
</body>
</html>
