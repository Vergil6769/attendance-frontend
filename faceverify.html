<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Face Verification</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<h2>Student Face Verification</h2>

<!-- =========================
LOGIN
========================= -->
<div id="login-section">

    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">

    <button id="login-btn">Login</button>

</div>


<!-- =========================
FACE VERIFICATION
========================= -->
<div id="face-section" style="display:none;">

    <h3>Face Verification</h3>

    <video id="camera" width="320" height="240" autoplay muted playsinline></video>

    <br><br>

    <button id="capture-btn">Verify Face</button>

    <p id="angle-info">Please look straight at the camera</p>

    <p id="timer"></p>

</div>


<!-- =========================
QR SCAN
========================= -->
<div id="qr-section" style="display:none;">

    <h3>Scan QR Code</h3>

    <video id="qr-camera" width="320" height="240" autoplay muted playsinline></video>

</div>


<!-- =========================
SCRIPTS
========================= -->

<!-- FaceAPI library -->
<script src="https://cdn.jsdelivr.net/npm/face-api.js"></script>

<!-- Your JS -->
<script src="js/face_capture.js"></script>

</body>
</html>
